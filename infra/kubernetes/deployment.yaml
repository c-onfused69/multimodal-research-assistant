apiVersion: apps/v1
kind: Deployment
metadata:
  name: mra-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mra-api
  template:
    metadata:
      labels:
        app: mra-api
    spec:
      containers:
      - name: api
        image: your-repo/mra-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: mra-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
