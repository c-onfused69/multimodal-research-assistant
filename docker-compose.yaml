services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]
  postgres:
    image: pgvector/pgvector:pg16
    environment: {POSTGRES_PASSWORD: dev}
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  langfuse:
    image: langfuse/langfuse:latest
    depends_on: [postgres]
    ports: ["3000:3000"]
volumes:
  qdrant_data:
